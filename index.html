<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Soja Monitor Pro v3.2 - GitHub Cloud Edition</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/shpjs/4.0.4/shp.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --primary: #1b5e20; --secondary: #2e7d32; --accent: #8bc34a; --dark: #0F172A;
      --danger: #d32f2f; --warning: #f59e0b; --info: #0288d1; --glass: rgba(255, 255, 255, 0.95);
      --shadow: 0 10px 40px rgba(0,0,0,0.2);
    }
    body { margin: 0; font-family: 'Plus Jakarta Sans', sans-serif; background: #f0f2f5; display: flex; height: 100vh; overflow: hidden; }
    #map { flex: 1; height: 100%; }
    .map-header {
      position: absolute; top: 20px; left: 20px; z-index: 1000; 
      background: var(--dark); color: white; padding: 12px 20px; 
      border-radius: 12px; box-shadow: var(--shadow); display: flex; align-items: center; gap: 10px;
      border: 1px solid var(--accent); pointer-events: none;
    }
    .map-header span { color: var(--accent); font-weight: 800; }
    .marker-label { background: rgba(15, 23, 42, 0.85); color: white; padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 700; margin-top: 5px; border: 1px solid var(--accent); white-space: nowrap; }
    
    #sidebar {
      position: fixed; right: -100%; top: 0; width: 750px; height: 100%;
      background: var(--glass); backdrop-filter: blur(15px);
      box-shadow: -15px 0 50px rgba(0,0,0,0.3);
      z-index: 1100; transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
      padding: 25px; box-sizing: border-box; display: flex; flex-direction: column;
    }
    #sidebar.active { right: 0; }
    .tab-nav { display: flex; gap: 10px; margin-bottom: 15px; }
    .tab-btn { flex: 1; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: 800; background: #e2e8f0; }
    .tab-btn.active { background: var(--primary); color: white; }
    .tab-content { display: none; flex-direction: column; flex-grow: 1; overflow-y: auto; }
    .tab-content.active { display: flex; }
    
    .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 15px; }
    .stat-card { background: white; padding: 12px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); border-top: 4px solid var(--secondary); }
    .stat-card small { color: #64748b; font-size: 9px; text-transform: uppercase; font-weight: 800; display: block; }
    #chart { width: 100%; min-height: 350px; background: white; border-radius: 15px; padding: 10px; }
    
    .forecast-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; margin-top: 15px; }
    .fc-card { background: white; padding: 12px 6px; border-radius: 12px; text-align: center; border: 1px solid #e2e8f0; }
    
    .close-panel-btn { position: absolute; left: -40px; top: 20px; background: var(--dark); color: white; border: none; width: 40px; height: 45px; border-radius: 10px 0 0 10px; cursor: pointer; }
    #month-selector { width: 100%; padding: 10px; border-radius: 8px; margin-bottom: 15px; font-weight: 700; }
    
    /* Loading Overlay */
    #loading-db {
        position: fixed; top:0; left:0; width:100%; height:100%; background: var(--dark);
        z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; color: white;
    }
  </style>
</head>
<body>

<div id="loading-db">
    <div style="font-size: 40px; margin-bottom: 20px;">🚜</div>
    <div id="loading-text">Conectando con base de datos en GitHub...</div>
</div>

<div class="map-header">
  <div>CROP <span>MONITOR</span> <span>PRO</span> <small>Cloud Edition</small></div>
</div>

<div id="map"></div>

<div id="sidebar">
  <button class="close-panel-btn" onclick="closeSidebar()">✕</button>
  <h2 id="station-name" style="margin: 0 0 15px 0; color: var(--dark); font-weight: 800;">Estación</h2>
  
  <div class="tab-nav">
    <button class="tab-btn active" onclick="showTab('monitor')">📈 MONITOR HISTÓRICO</button>
    <button class="tab-btn" onclick="showTab('forecast')">🌤️ PRONÓSTICO</button>
  </div>

  <div id="tab-monitor" class="tab-content active">
    <select id="month-selector" onchange="filterByMonth()"></select>
    <div class="stats-grid">
      <div class="stat-card"><small>💧 Lluvia</small><div id="total-prec">0 mm</div></div>
      <div class="stat-card"><small>☀️ ETp</small><div id="total-etp">0 mm</div></div>
      <div class="stat-card"><small>📈 GDD</small><div id="total-gdd">0 °C/d</div></div>
      <div class="stat-card"><small>⚖️ Balance</small><div id="water-balance">0 mm</div></div>
    </div>
    <div id="chart"></div>
  </div>

  <div id="tab-forecast" class="tab-content">
    <div id="forecast-container" class="forecast-grid"></div>
  </div>
</div>

<script>
// CONFIGURACIÓN DE RUTAS DE GITHUB
const GITHUB_USER = "Diego2377872";
const GITHUB_REPO = "sojamonitor";
const RAW_URL = `https://raw.githubusercontent.com/${GITHUB_USER}/${GITHUB_REPO}/main/.data/`;

let estacionesData = {};
let currentLoc = null;
let currentFilteredData = null;
const baseTemp = 10;
const chart = echarts.init(document.getElementById('chart'));

// MAPA
const googleHybrid = L.tileLayer('https://{s}.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', { subdomains: ['mt0', 'mt1', 'mt2', 'mt3'], attribution: '© Google' });
const map = L.map('map', { center: [-23.5, -58.5], zoom: 6, layers: [googleHybrid] });

// 1. CARGA INICIAL DE ESTACIONES
async function initApp() {
    try {
        const response = await fetch(`${RAW_URL}estaciones.json`);
        if (!response.ok) throw new Error("Error al cargar estaciones.json");
        estacionesData = await response.json();
        renderMarkers();
        document.getElementById('loading-db').style.display = 'none';
    } catch (err) {
        document.getElementById('loading-text').innerText = "Error: No se pudo conectar a GitHub.";
        console.error(err);
    }
}

function renderMarkers() {
    Object.keys(estacionesData).forEach(name => {
        const est = estacionesData[name];
        L.marker(est.coords, {
            icon: L.divIcon({
                className: 'custom-icon',
                html: `<div style="text-align:center">📍<div class="marker-label">${name}</div></div>`,
                iconSize: [100, 40]
            })
        }).addTo(map).on('click', () => selectStation(name));
    });
}

// 2. SELECCIÓN DE ESTACIÓN Y CARGA DE HISTORIAL JSON
async function selectStation(name) {
    const est = estacionesData[name];
    currentLoc = name;
    document.getElementById('station-name').innerText = est.titulo;

    // Si no tiene el historial cargado, "estirarlo" de GitHub
    if (!est.historial) {
        document.getElementById('station-name').innerText = "Cargando datos...";
        try {
            const resp = await fetch(`${RAW_URL}${est.archivo}`);
            estacionesData[name].historial = await resp.json();
            document.getElementById('station-name').innerText = est.titulo;
        } catch (e) {
            alert("Error al cargar los datos históricos de esta estación.");
            return;
        }
    }

    document.getElementById('sidebar').classList.add('active');
    updateMonthSelector();
    filterByMonth();
    fetchForecast(est.coords[0], est.coords[1]);
    setTimeout(() => chart.resize(), 500);
}

// LÓGICA DE PROCESAMIENTO (IDÉNTICA A TU V29 PERO ADAPTADA)
function updateMonthSelector() {
    const selector = document.getElementById('month-selector');
    const hist = estacionesData[currentLoc].historial;
    selector.innerHTML = '<option value="all">Ciclo Completo</option>';
    const meses = ["Ene", "Feb", "Mar", "Abr", "May", "Jun", "Jul", "Ago", "Sep", "Oct", "Nov", "Dic"];
    
    hist.forEach((item, index) => {
        const opt = document.createElement('option');
        opt.value = index;
        opt.textContent = `${meses[item.month-1]} ${item.year}`;
        selector.appendChild(opt);
    });
    selector.value = hist.length - 1;
}

function filterByMonth() {
    const val = document.getElementById('month-selector').value;
    const hist = estacionesData[currentLoc].historial;
    
    if (val === "all") {
        currentFilteredData = {
            tmax: hist.flatMap(h => h.tmax),
            tmin: hist.flatMap(h => h.tmin),
            prec: hist.flatMap(h => h.prec)
        };
    } else {
        const s = hist[parseInt(val)];
        currentFilteredData = { tmax: [...s.tmax], tmin: [...s.tmin], prec: [...s.prec] };
    }
    updateChart();
}

function updateChart() {
    const d = currentFilteredData;
    const etp = d.tmax.map((tx, i) => 0.0023 * 15 * (((tx + (d.tmin[i]||tx-10))/2)+17.8) * Math.sqrt(tx-(d.tmin[i]||tx-10)));
    const gdd = d.tmax.map((tx, i) => Math.max(0, ((tx + (d.tmin[i]||tx-10))/2) - baseTemp));

    chart.setOption({
        tooltip: { trigger: 'axis' },
        xAxis: { type: 'category', data: d.tmax.map((_, i) => i + 1) },
        yAxis: [{ type: 'value', name: '°C' }, { type: 'value', name: 'mm', position: 'right' }],
        series: [
            { name: 'Lluvia', type: 'bar', yAxisIndex: 1, data: d.prec, itemStyle: {color: '#4fc3f7'} },
            { name: 'T.Máx', type: 'line', data: d.tmax, itemStyle: {color: '#ef5350'}, smooth: true },
            { name: 'ETp', type: 'line', yAxisIndex: 1, data: etp.map(v => v.toFixed(1)), lineStyle: {type: 'dashed'}, itemStyle: {color: '#ab47bc'} }
        ]
    }, true);

    const sumPrec = d.prec.reduce((a,b) => a+b, 0).toFixed(1);
    const sumEtp = etp.reduce((a,b) => a+b, 0).toFixed(1);
    document.getElementById('total-prec').innerText = sumPrec + " mm";
    document.getElementById('total-etp').innerText = sumEtp + " mm";
    document.getElementById('total-gdd').innerText = Math.round(gdd.reduce((a,b) => a+b, 0)) + " °C/d";
    document.getElementById('water-balance').innerText = (sumPrec - sumEtp).toFixed(1) + " mm";
}

async function fetchForecast(lat, lon) {
    const container = document.getElementById('forecast-container');
    container.innerHTML = "Cargando pronóstico...";
    try {
        const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&daily=temperature_2m_max,temperature_2m_min,precipitation_sum&timezone=auto`;
        const res = await fetch(url);
        const data = await res.json();
        container.innerHTML = "";
        data.daily.time.forEach((t, i) => {
            container.innerHTML += `
                <div class="fc-card">
                    <small>${t.split('-')[2]}/${t.split('-')[1]}</small><br>
                    <b style="color:red">${Math.round(data.daily.temperature_2m_max[i])}°</b><br>
                    <b style="color:blue">${data.daily.precipitation_sum[i]}mm</b>
                </div>`;
        });
    } catch (e) { container.innerHTML = "Error de pronóstico."; }
}

function showTab(tab) {
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    document.getElementById('tab-' + tab).classList.add('active');
    if(tab === 'monitor') chart.resize();
}

function closeSidebar() { document.getElementById('sidebar').classList.remove('active'); }

// Iniciar
initApp();
</script>
</body>
</html>
